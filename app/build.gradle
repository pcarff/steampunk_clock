apply plugin: 'com.android.application'

android {
    namespace "net.carff.android.steampunkclock"
    compileSdk 35

    defaultConfig {
        applicationId "net.carff.android.steampunkclock"
        minSdk 34
        targetSdk 35
    }

    buildFeatures {
        buildConfig true
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.txt'
        }
    }
}

dependencies {
    implementation 'androidx.core:core:1.13.1'
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'
}
